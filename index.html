<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Viagens PRO</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; font-size: 1.4rem; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .section { margin-bottom: 20px; background: #fafafa; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        h3 { font-size: 1rem; margin-top: 0; color: var(--primary); }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--accent); }
        .btn-copy { background: #3498db; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .summary { background: #eef2f7; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .summary p { margin: 8px 0; display: flex; justify-content: space-between; }
        .total-destaque { font-size: 1.1rem; color: #2c3e50; border-top: 1px solid #ccc; padding-top: 10px; }
        .toast { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Relatório de Viagem</h1>

    <div class="section">
        <h3>📅 Identificação</h3>
        <input type="number" id="numViagem" placeholder="Número da Viagem">
        <div class="grid">
            <div><label style="font-size: 0.7rem;">Início:</label><input type="date" id="dataInicio"></div>
            <div><label style="font-size: 0.7rem;">Fim:</label><input type="date" id="dataFim"></div>
        </div>
    </div>

    <div class="section">
        <h3>📦 Caixas</h3>
        <input type="number" id="qtdCaixas" placeholder="Quantidade de Caixas" oninput="atualizarTela()">
    </div>

    <div class="section">
        <h3>💰 Lançar Notas</h3>
        <input type="text" id="cliente" placeholder="Nome do Cliente">
        <div class="grid">
            <input type="text" id="valorNota" placeholder="Valor" inputmode="decimal">
            <input type="text" id="comissao" placeholder="Comiss. %" inputmode="decimal">
        </div>
        <button onclick="adicionarNota()" class="btn-save">➕ Adicionar Nota</button>
    </div>

    <div class="section">
        <h3>🎟️ Passagens</h3>
        <input type="text" id="descPassagem" placeholder="Descrição (Ex: Londrina/SP)">
        <input type="text" id="valorPassagem" placeholder="Valor da Passagem" inputmode="decimal">
        <button onclick="adicionarPassagem()" style="background: #9b59b6;">🎟️ Adicionar Passagem</button>
    </div>

    <div class="section">
        <h3>⛽ Outras Despesas</h3>
        <select id="tipoGasto">
            <option value="Transporte">🚗 Combustível/Táxi</option>
            <option value="Alimentação">🍴 Alimentação</option>
            <option value="Hospedagem">🏨 Hospedagem</option>
            <option value="Banheiro">🧻 Banheiro</option>
            <option value="Outros">⚙️ Outros</option>
        </select>
        <input type="text" id="valorGasto" placeholder="Valor Gasto" inputmode="decimal">
        <button onclick="adicionarGasto()">💸 Registrar Gasto</button>
    </div>

    <div class="summary">
        <p>Notas: <span id="totalNotas">R$ 0,00</span></p>
        <p>Comissões: <span id="totalComissao">R$ 0,00</span></p>
        <p>Caixas: <span id="totalValorCaixas">R$ 0,00</span></p>
        <p>Gastos (Passagens + Despesas): <span id="totalGastos">R$ 0,00</span></p>
        <p class="total-destaque"><strong>Saldo Líquido:</strong> <strong id="saldoFinal">R$ 0,00</strong></p>
    </div>
    
    <button onclick="copiarRelatorio()" class="btn-copy">📋 Copiar Relatório Completo</button>
    <button onclick="limparDados()" style="background:#e74c3c; margin-top:30px; font-size: 0.8rem;">🗑️ Limpar Tudo</button>
</div>

<div id="toast" class="toast">Copiado com sucesso! ✅</div>

<script>
    let dados = JSON.parse(localStorage.getItem('relatorio_v8')) || { info: {num: '', inicio: '', fim: '', caixas: 0}, notas: [], passagens: [], gastos: [] };
    
    document.getElementById('numViagem').value = dados.info.num || '';
    document.getElementById('dataInicio').value = dados.info.inicio || '';
    document.getElementById('dataFim').value = dados.info.fim || '';
    document.getElementById('qtdCaixas').value = dados.info.caixas || '';

    function limparMoeda(valor) {
        if (!valor) return 0;
        let v = valor.toString().replace(/\./g, '').replace(',', '.');
        return parseFloat(v) || 0;
    }

    function formatarMoeda(valor) {
        return valor.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });
    }

    function atualizarTela() {
        let tNotas = dados.notas.reduce((acc, n) => acc + n.valor, 0);
        let tComissao = dados.notas.reduce((acc, n) => acc + (n.valor * (n.comissao/100)), 0);
        let tPassagens = dados.passagens.reduce((acc, p) => acc + p.valor, 0);
        let tGastos = dados.gastos.reduce((acc, g) => acc + g.valor, 0);
        
        let qtdCaixas = parseInt(document.getElementById('qtdCaixas').value) || 0;
        let valC = qtdCaixas * 50;

        document.getElementById('totalNotas').innerText = formatarMoeda(tNotas);
        document.getElementById('totalComissao').innerText = formatarMoeda(tComissao);
        document.getElementById('totalValorCaixas').innerText = formatarMoeda(valC);
        document.getElementById('totalGastos').innerText = formatarMoeda(tPassagens + tGastos);
        document.getElementById('saldoFinal').innerText = formatarMoeda((tComissao + valC) - (tPassagens + tGastos));
        
        dados.info = { num: document.getElementById('numViagem').value, inicio: document.getElementById('dataInicio').value, fim: document.getElementById('dataFim').value, caixas: qtdCaixas };
        localStorage.setItem('relatorio_v8', JSON.stringify(dados));
    }

    function adicionarNota() {
        const v = limparMoeda(document.getElementById('valorNota').value);
        if(v > 0) {
            dados.notas.push({ cliente: document.getElementById('cliente').value || "Cli", valor: v, comissao: limparMoeda(document.getElementById('comissao').value) });
            atualizarTela();
            document.getElementById('cliente').value = ''; document.getElementById('valorNota').value = '';
        }
    }

    function adicionarPassagem() {
        const v = limparMoeda(document.getElementById('valorPassagem').value);
        if(v > 0) {
            dados.passagens.push({ desc: document.getElementById('descPassagem').value || "Passagem", valor: v });
            atualizarTela();
            document.getElementById('descPassagem').value = ''; document.getElementById('valorPassagem').value = '';
        }
    }

    function adicionarGasto() {
        const v = limparMoeda(document.getElementById('valorGasto').value);
        if(v > 0) {
            dados.gastos.push({ tipo: document.getElementById('tipoGasto').value, valor: v });
            atualizarTela();
            document.getElementById('valorGasto').value = '';
        }
    }

    function formatarDataBR(data) {
        if(!data) return "--/--/--";
        const [ano, mes, dia] = data.split('-');
        return `${dia}/${mes}/${ano}`;
    }

    function copiarRelatorio() {
        const info = dados.info;
        const valC = info.caixas * 50;
        let texto = `*🚚 RELATÓRIO Nº ${info.num || 'S/N'}*\n📅 ${formatarDataBR(info.inicio)} até ${formatarDataBR(info.fim)}\n\n`;
        texto += `*📦 CAIXAS:* ${info.caixas} un. (${formatarMoeda(valC)})\n\n`;

        texto += `*💰 NOTAS/COMISSÕES:*\n`;
        dados.notas.forEach(n => texto += `• ${n.cliente}: ${formatarMoeda(n.valor)} (${n.comissao}% = ${formatarMoeda(n.valor * (n.comissao/100))})\n`);

        if(dados.passagens.length > 0) {
            texto += `\n*🎟️ PASSAGENS:*\n`;
            dados.passagens.forEach(p => texto += `• ${p.desc}: ${formatarMoeda(p.valor)}\n`);
        }

        texto += `\n*💸 OUTRAS DESPESAS:*\n`;
        dados.gastos.forEach(g => texto += `• ${g.tipo}: ${formatarMoeda(g.valor)}\n`);

        let tCom = dados.notas.reduce((acc, n) => acc + (n.valor * (n.comissao/100)), 0);
        let tGas = dados.passagens.reduce((acc, p) => acc + p.valor, 0) + dados.gastos.reduce((acc, g) => acc + g.valor, 0);
        
        texto += `\n---------------------------\n`;
        texto += `*💵 TOTAL LUCRO:* ${formatarMoeda(tCom + valC)}\n`;
        texto += `*📉 TOTAL GASTOS:* ${formatarMoeda(tGas)}\n`;
        texto += `*⚖️ SALDO LÍQUIDO: ${formatarMoeda((tCom + valC) - tGas)}*`;

        navigator.clipboard.writeText(texto).then(() => {
            const t = document.getElementById('toast'); t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000);
        });
    }

    function limparDados() {
        if(confirm("Zerar tudo?")) {
            dados = { info: {num: '', inicio: '', fim: '', caixas: 0}, notas: [], passagens: [], gastos: [] };
            location.reload();
        }
    }

    document.querySelectorAll('#numViagem, #dataInicio, #dataFim').forEach(el => el.addEventListener('input', atualizarTela));
    atualizarTela();
</script>
</body>
</html>
